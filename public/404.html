<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Not Found</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-6">
  <div class="text-center">
    <p class="text-7xl font-bold text-blue-600">404</p>
    <h1 class="text-2xl font-semibold text-slate-900 mt-4">Page not found</h1>
    <p class="text-slate-500 mt-2">The page you are looking for does not exist.</p>
    <a href="/" class="inline-block mt-6 px-4 py-2 rounded-lg bg-blue-600 text-white hover:bg-blue-700">Go home</a>
  </div>
</body>
</html>
