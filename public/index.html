<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Profile Manager</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col">
  <header class="bg-white border-b border-slate-200 shadow-sm">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl bg-blue-600 text-white flex items-center justify-center font-bold">SP</div>
        <div>
          <h1 class="text-lg sm:text-xl font-semibold text-slate-900">Student Profile Manager</h1>
          <p class="text-xs text-slate-500">Manage student records</p>
        </div>
      </div>
      <a href="/api/docs" target="_blank" rel="noopener"
         class="text-sm font-medium text-blue-600 hover:text-blue-700 hover:underline">
        API Docs &rarr;
      </a>
    </div>
  </header>

  <main class="flex-1 max-w-6xl w-full mx-auto px-4 sm:px-6 py-6 space-y-6">
    <section id="stats" class="grid grid-cols-1 sm:grid-cols-3 gap-4">
      <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-5">
        <p class="text-xs uppercase tracking-wide text-slate-500">Total Students</p>
        <p id="stat-total" class="text-3xl font-bold text-slate-900 mt-1">—</p>
      </div>
      <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-5">
        <p class="text-xs uppercase tracking-wide text-slate-500">Courses</p>
        <p id="stat-courses" class="text-3xl font-bold text-slate-900 mt-1">—</p>
      </div>
      <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-5">
        <p class="text-xs uppercase tracking-wide text-slate-500">Recent (30 days)</p>
        <p id="stat-recent" class="text-3xl font-bold text-slate-900 mt-1">—</p>
      </div>
    </section>

    <section class="bg-white rounded-2xl shadow-sm border border-slate-200 p-4 sm:p-5">
      <div class="flex flex-col sm:flex-row gap-3 sm:items-center sm:justify-between">
        <div class="flex flex-col sm:flex-row gap-3 flex-1">
          <input id="search" type="text" placeholder="Search by name or email"
                 class="flex-1 px-4 py-2 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" />
          <select id="course-filter"
                  class="px-4 py-2 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
            <option value="">All courses</option>
          </select>
        </div>
        <button id="add-btn"
                class="px-4 py-2 rounded-lg bg-blue-600 text-white font-medium hover:bg-blue-700 transition">
          + Add Student
        </button>
      </div>
    </section>

    <section class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
      <div id="list-container" class="min-h-[300px]">
        <div id="loading" class="hidden p-10 text-center text-slate-500">Loading students…</div>
        <div id="empty" class="hidden p-10 text-center">
          <p class="text-slate-700 font-medium">No students yet.</p>
          <p class="text-slate-500 text-sm mt-1">Add your first one.</p>
        </div>
        <div id="error" class="hidden p-10 text-center text-red-600"></div>

        <div class="overflow-x-auto">
          <table id="students-table" class="hidden w-full text-left">
            <thead class="bg-slate-50 text-xs uppercase tracking-wide text-slate-500">
              <tr>
                <th class="px-4 py-3">Name</th>
                <th class="px-4 py-3 hidden sm:table-cell">Email</th>
                <th class="px-4 py-3 hidden md:table-cell">Course</th>
                <th class="px-4 py-3 hidden md:table-cell">Age</th>
                <th class="px-4 py-3 hidden lg:table-cell">Registered</th>
                <th class="px-4 py-3 text-right">Actions</th>
              </tr>
            </thead>
            <tbody id="students-tbody" class="divide-y divide-slate-100"></tbody>
          </table>
        </div>
      </div>

      <div id="pagination" class="hidden flex items-center justify-between p-4 border-t border-slate-100 text-sm">
        <p id="page-info" class="text-slate-500"></p>
        <div class="flex gap-2">
          <button id="prev-btn" class="px-3 py-1.5 rounded-lg border border-slate-300 hover:bg-slate-100 disabled:opacity-40 disabled:cursor-not-allowed">Prev</button>
          <button id="next-btn" class="px-3 py-1.5 rounded-lg border border-slate-300 hover:bg-slate-100 disabled:opacity-40 disabled:cursor-not-allowed">Next</button>
        </div>
      </div>
    </section>
  </main>

  <footer class="text-center text-xs text-slate-500 py-6">
    Student Profile API &middot; <a href="/api/docs" class="text-blue-600 hover:underline">Docs</a>
  </footer>

  <!-- Modal -->
  <div id="modal" class="hidden fixed inset-0 bg-slate-900/50 flex items-center justify-center p-4 z-50">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-md max-h-[90vh] overflow-y-auto">
      <div class="flex items-center justify-between p-5 border-b border-slate-100">
        <h2 id="modal-title" class="text-lg font-semibold text-slate-900">Add Student</h2>
        <button id="modal-close" class="text-slate-400 hover:text-slate-700 text-2xl leading-none">&times;</button>
      </div>
      <form id="student-form" class="p-5 space-y-4">
        <input type="hidden" id="student-id" />
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">First Name</label>
          <input id="firstName" type="text" required minlength="2" maxlength="50"
                 class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-blue-500" />
          <p data-error="firstName" class="text-xs text-red-600 mt-1 hidden"></p>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Last Name</label>
          <input id="lastName" type="text" required minlength="2" maxlength="50"
                 class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-blue-500" />
          <p data-error="lastName" class="text-xs text-red-600 mt-1 hidden"></p>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Email</label>
          <input id="email" type="email" required
                 class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-blue-500" />
          <p data-error="email" class="text-xs text-red-600 mt-1 hidden"></p>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Age</label>
            <input id="age" type="number" min="0" max="150"
                   class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-blue-500" />
            <p data-error="age" class="text-xs text-red-600 mt-1 hidden"></p>
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Course</label>
            <input id="course" type="text" maxlength="100"
                   class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-blue-500" />
            <p data-error="course" class="text-xs text-red-600 mt-1 hidden"></p>
          </div>
        </div>
        <div class="flex justify-end gap-2 pt-2">
          <button type="button" id="cancel-btn"
                  class="px-4 py-2 rounded-lg border border-slate-300 text-slate-700 hover:bg-slate-100">Cancel</button>
          <button type="submit" id="submit-btn"
                  class="px-4 py-2 rounded-lg bg-blue-600 text-white font-medium hover:bg-blue-700">Save</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Confirm dialog -->
  <div id="confirm" class="hidden fixed inset-0 bg-slate-900/50 flex items-center justify-center p-4 z-50">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-sm p-5">
      <h3 class="text-lg font-semibold text-slate-900">Delete student?</h3>
      <p id="confirm-message" class="text-sm text-slate-600 mt-2">This cannot be undone.</p>
      <div class="flex justify-end gap-2 mt-4">
        <button id="confirm-cancel" class="px-4 py-2 rounded-lg border border-slate-300 text-slate-700 hover:bg-slate-100">Cancel</button>
        <button id="confirm-ok" class="px-4 py-2 rounded-lg bg-red-600 text-white hover:bg-red-700">Delete</button>
      </div>
    </div>
  </div>

  <!-- Toast container -->
  <div id="toast-container" class="fixed top-4 right-4 z-50 space-y-2"></div>

  <script src="/app.js"></script>
</body>
</html>
